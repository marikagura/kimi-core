name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install   # not `npm ci`: a single-platform (macOS) lockfile can't be
                           #   reliably completed for Linux's esbuild/tsx optional deps
                           #   (@emnapi/*), and npm install reconciles cross-platform.
      - run: npm run db:generate
      - run: npx tsc --noEmit
      - run: npm run lint   # eslint: no-floating-promises (error) + no-explicit-any (warn)
      - run: npm test
      - run: npm run scrub   # shape-layer de-id gate (private-word layer is local/pre-push)
